<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --olive-900: #2F3A14;
    --olive-800: #44531F;
    --olive-600: #5C6B2E;
    --olive-400: #8A9A5B;
    --olive-200: #C7D1A8;
    --olive-100: #DEE6C7;
    --olive-50: #EFF3E5;
    --dark: #1A1A1A;
    --text: #1A1A1A;
    --muted: #6E7860;
    --border: rgba(92,107,46,0.22);
    --border-strong: rgba(92,107,46,0.45);
    --bg: #FFFFFF;
    --card: #FFFFFF;
    --radius: 12px;
  }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* HERO */
  .hero {
    text-align: center;
    padding: 3.5rem 1.5rem 2.5rem;
    background: linear-gradient(180deg, #E3E8D2 0%, var(--bg) 100%);
    border-bottom: 1px solid var(--border);
  }

  .hero-ornament {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: clamp(0.85rem, 2vw, 1rem);
    color: var(--olive-600);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    margin-bottom: 0.75rem;
  }

  .hero h1 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: clamp(2.4rem, 8vw, 4.2rem);
    color: var(--dark);
    line-height: 1.05;
    letter-spacing: -0.01em;
  }

  .hero h1 em {
    font-style: italic;
    color: var(--olive-600);
  }

  .hero-sub {
    margin-top: 1rem;
    font-size: clamp(0.8rem, 2vw, 0.9rem);
    color: var(--muted);
    letter-spacing: 0.06em;
  }

  /* SEARCH */
  .search-wrap {
    max-width: 600px;
    margin: 2rem auto 0;
    padding: 0 1.5rem;
  }

  .search-box {
    position: relative;
    display: flex;
    align-items: center;
    background: var(--card);
    border: 1px solid var(--border-strong);
    border-radius: 50px;
    overflow: hidden;
    transition: box-shadow 0.2s;
  }

  .search-box:focus-within {
    box-shadow: 0 0 0 3px rgba(92,107,46,0.16);
    border-color: var(--olive-600);
  }

  .search-icon {
    padding: 0 0 0 1.25rem;
    color: var(--olive-600);
    font-size: 1.1rem;
    pointer-events: none;
    flex-shrink: 0;
  }

  .search-box input {
    flex: 1;
    border: none;
    outline: none;
    background: transparent;
    padding: 0.95rem 1rem;
    font-size: 1rem;
    font-family: 'Inter', sans-serif;
    color: var(--text);
  }

  .search-box input::placeholder { color: var(--muted); }

  .clear-btn {
    border: none;
    background: none;
    padding: 0.95rem 1.25rem;
    cursor: pointer;
    color: var(--muted);
    font-size: 1rem;
    line-height: 1;
    transition: color 0.15s;
  }
  .clear-btn:hover { color: var(--olive-600); }

  /* RESULTS */
  .results {
    max-width: 720px;
    margin: 1.5rem auto 0;
    padding: 0 1.5rem;
  }

  .results-label {
    font-size: 0.78rem;
    color: var(--muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 0.75rem;
  }

  .result-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 0.75rem;
    overflow: hidden;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .result-card:hover {
    border-color: var(--border-strong);
    box-shadow: 0 2px 16px rgba(92,107,46,0.1);
  }

  .result-header {
    display: flex;
    align-items: center;
    gap: 1rem;
    padding: 1rem 1.25rem;
    cursor: pointer;
    user-select: none;
  }

  .mesa-badge {
    flex-shrink: 0;
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: var(--olive-50);
    border: 1.5px solid var(--border-strong);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0;
  }

  .mesa-badge .label {
    font-size: 0.55rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--olive-600);
    font-weight: 500;
    line-height: 1;
  }

  .mesa-badge .num {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.3rem;
    font-weight: 600;
    color: var(--dark);
    line-height: 1;
  }

  .result-info { flex: 1; min-width: 0; }

  .result-name {
    font-size: 0.98rem;
    font-weight: 500;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .result-name mark {
    background: none;
    color: var(--olive-600);
    font-weight: 500;
  }

  .result-meta {
    font-size: 0.8rem;
    color: var(--muted);
    margin-top: 2px;
  }

  .chevron {
    flex-shrink: 0;
    color: var(--olive-600);
    font-size: 0.85rem;
    transition: transform 0.2s;
  }

  .result-card.open .chevron { transform: rotate(180deg); }

  /* TABLE DETAIL */
  .table-detail {
    display: none;
    padding: 0 1.25rem 1.25rem;
    border-top: 1px solid var(--border);
    animation: fadeIn 0.15s ease;
  }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: none; } }

  .result-card.open .table-detail { display: block; }

  .detail-title {
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.09em;
    color: var(--muted);
    margin: 1rem 0 0.6rem;
  }

  .seat-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 6px;
  }

  .seat-pill {
    font-size: 0.82rem;
    padding: 6px 10px;
    border-radius: 6px;
    background: var(--olive-50);
    border: 1px solid var(--border);
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .seat-pill.highlight {
    background: var(--olive-100);
    border-color: var(--olive-600);
    color: var(--olive-900);
    font-weight: 500;
  }

  /* VENUE MAP */
  .venue-map-wrap {
    margin-top: 0.5rem;
  }

  .venue-map {
    width: 100%;
    max-width: 600px;
    margin: 0 auto;
    display: block;
  }

  .map-cell rect {
    fill: var(--olive-50);
    stroke: var(--border-strong);
    stroke-width: 0.75;
  }

  .map-cell text {
    fill: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 8px;
    font-weight: 400;
  }

  .map-static rect {
    fill: var(--bg);
    stroke: var(--border);
    stroke-width: 0.75;
    stroke-dasharray: 2,2;
  }

  .map-static text {
    fill: var(--muted);
    font-family: 'Inter', sans-serif;
    font-size: 6.5px;
    font-weight: 400;
  }

  .map-highlight rect {
    fill: var(--olive-600);
    stroke: var(--olive-900);
    stroke-width: 1.2;
  }

  .map-highlight text {
    fill: #FFFFFF;
    font-weight: 500;
    font-size: 9px;
  }

  .map-legend {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-top: 0.6rem;
    font-size: 0.78rem;
    color: var(--muted);
  }

  .map-legend-swatch {
    width: 14px;
    height: 14px;
    border-radius: 3px;
    background: var(--olive-600);
    border: 1px solid var(--olive-900);
    flex-shrink: 0;
  }

  /* EMPTY */
  .empty {
    text-align: center;
    padding: 2.5rem 1rem;
    color: var(--muted);
  }

  .empty-icon { font-size: 2rem; margin-bottom: 0.5rem; color: var(--olive-200); }
  .empty p { font-size: 0.9rem; }

  /* FOOTER */
  footer {
    text-align: center;
    padding: 3rem 1rem 2rem;
    font-size: 0.78rem;
    color: var(--muted);
    letter-spacing: 0.04em;
  }

  footer .hearts { color: var(--olive-600); font-size: 0.9rem; }

  /* RESPONSIVE tweaks */
  @media (max-width: 480px) {
    .hero { padding: 2.5rem 1rem 2rem; }
    .seat-grid { grid-template-columns: 1fr 1fr; }
    .map-static text { font-size: 5.5px; }
    .map-cell text { font-size: 7px; }
    .map-highlight text { font-size: 8px; }
  }
</style>
</head>

function svgRect(x,y,w,h,label,cls){
  const cx = x + w/2, cy = y + h/2;
  return `<g class="${cls}"><rect x="${x}" y="${y}" width="${w}" height="${h}" rx="3"></rect>` +
    `<text x="${cx}" y="${cy}" text-anchor="middle" dominant-baseline="middle">${label}</text></g>`;
}

function renderVenueMap(highlightMesa){
  let svg = `<svg class="venue-map" viewBox="0 0 600 300" xmlns="http://www.w3.org/2000/svg" role="img" ` +
    `aria-label="Mapa do salão com a mesa ${highlightMesa} destacada">`;
  mapStatic.forEach(b => { svg += svgRect(b.x, b.y, b.w, b.h, b.label, 'map-static'); });
  for(let n = 1; n <= 30; n++){
    const t = mapTables[n];
    const cls = (n === highlightMesa) ? 'map-cell map-highlight' : 'map-cell';
    svg += svgRect(t.x, t.y, t.w, t.h, n, cls);
  }
  svg += `</svg>`;
  return svg;
}

function norm(s){
  return s.normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase().trim();
}

function highlight(text, q){
  if(!q) return text;
  const n = norm(text), nq = norm(q);
  const i = n.indexOf(nq);
  if(i === -1) return text;
  return text.slice(0,i) + '<mark>' + text.slice(i, i+q.length) + '</mark>' + text.slice(i+q.length);
}

function getMesaGuests(mesa){
  return guests.filter(g => g.mesa === mesa);
}

function render(query){
  const res = document.getElementById('results');
  if(!query || query.length < 2){
    res.innerHTML = '';
    return;
  }
  const q = norm(query);

  const matchedGuests = guests.filter(g =>
    norm(g.name).includes(q) || norm(g.family).includes(q)
  );

  if(!matchedGuests.length){
    res.innerHTML = `<div class="empty"><div class="empty-icon">&#9825;</div><p>Nenhum convidado encontrado para "<strong>${query}</strong>".</p><p style="margin-top:0.4rem;font-size:0.8rem">Tente o sobrenome ou o nome da família.</p></div>`;
    return;
  }

  const seen = new Set();
  const items = [];

  matchedGuests.forEach(g => {
    const key = g.family + '|' + g.mesa;
    if(!seen.has(key)){
      seen.add(key);
      items.push({family: g.family, mesa: g.mesa, matchedName: g.name});
    }
  });

  items.sort((a,b) => a.mesa - b.mesa);

  const count = items.length;
  res.innerHTML = `<p class="results-label">${count} resultado${count!==1?'s':''} encontrado${count!==1?'s':''}</p>` +
    items.map((item, idx) => {
      const mesaGuests = getMesaGuests(item.mesa);
      const seatsHtml = mesaGuests.map(g => {
        const isMatch = norm(g.name).includes(q) || norm(g.family).includes(q);
        return `<div class="seat-pill ${isMatch?'highlight':''}">${isMatch ? highlight(g.name, query) : g.name}</div>`;
      }).join('');

      const familyLabel = item.family !== item.matchedName ? highlight(item.family, query) : highlight(item.matchedName, query);
      const subLabel = item.family !== item.matchedName ? highlight(item.matchedName, query) : '';

      return `
      <div class="result-card" id="card-${idx}">
        <div class="result-header" onclick="toggle(${idx})">
          <div class="mesa-badge">
            <span class="label">mesa</span>
            <span class="num">${item.mesa}</span>
          </div>
          <div class="result-info">
            <div class="result-name">${familyLabel}</div>
            ${subLabel ? `<div class="result-meta">${subLabel}</div>` : ''}
            <div class="result-meta">${mesaGuests.length} pessoa${mesaGuests.length!==1?'s':''} nesta mesa</div>
          </div>
          <span class="chevron">&#9660;</span>
        </div>
        <div class="table-detail">
          <p class="detail-title">Quem está na mesa ${item.mesa}</p>
          <div class="seat-grid">${seatsHtml}</div>
          <p class="detail-title">Onde fica a mesa ${item.mesa}</p>
          <div class="venue-map-wrap">
            ${renderVenueMap(item.mesa)}
            <div class="map-legend"><span class="map-legend-swatch"></span>Sua mesa</div>
          </div>
        </div>
      </div>`;
    }).join('');
}

function toggle(idx){
  const card = document.getElementById('card-'+idx);
  card.classList.toggle('open');
}

const input = document.getElementById('searchInput');
const clearBtn = document.getElementById('clearBtn');

input.addEventListener('input', () => {
  const q = input.value;
  clearBtn.style.display = q ? 'block' : 'none';
  render(q);
});

clearBtn.addEventListener('click', () => {
  input.value = '';
  clearBtn.style.display = 'none';
  document.getElementById('results').innerHTML = '';
  input.focus();
});
